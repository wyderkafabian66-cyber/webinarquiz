<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Your Character Blueprint | King Azoulay</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-l:#E4C97B;--gold-d:#9A7530;
  --black:#0A0A0A;--d2:#1A1A1A;--white:#F5F0E8;--gray:#888;
  --red:#C47070;
}
html,body{background:var(--black);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
.wrap{max-width:680px;margin:0 auto;padding:64px 24px 100px}
.sec-label{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gray);margin-bottom:16px;margin-top:48px}
.result-header{text-align:center;margin-bottom:48px;padding-top:32px}
.bottleneck-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;background:var(--gold);color:var(--black);padding:6px 16px;margin-bottom:20px}
.result-title{font-family:'Cinzel',serif;font-size:clamp(26px,5vw,46px);font-weight:900;line-height:1.1;color:var(--white);margin-bottom:16px}
.result-title em{font-style:normal;color:var(--gold)}
.result-lead{font-size:16px;line-height:1.75;color:#BDB097;max-width:540px;margin:0 auto}
.greeting{font-size:13px;color:var(--gray);margin-bottom:8px}

/* STAT BARS */
.stats-block{border:1px solid #222;padding:28px 24px;margin-bottom:8px}
.stat-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.stat-row:last-child{margin-bottom:0}
.stat-name{width:76px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray);flex-shrink:0}
.stat-name.bot{color:var(--gold)}
.stat-bar{flex:1;height:6px;background:#1A1A1A;overflow:hidden}
.stat-fill{height:100%;width:0%;transition:width 1.2s ease}
.stat-fill.low{background:var(--red)}
.stat-fill.ok{background:var(--gold-d)}
.stat-pct{width:34px;font-size:11px;font-weight:700;text-align:right;flex-shrink:0;color:var(--gray)}
.stat-pct.bot{color:var(--red)}
.bot-note{font-size:12px;color:var(--red);margin-top:16px;padding-top:16px;border-top:1px solid #1A1A1A}

/* PROTOCOL TABS */
.proto-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.proto-tab{flex:1;min-width:80px;padding:10px 8px;border:1px solid #2A2A2A;background:var(--d2);cursor:pointer;transition:all .2s;text-align:center;position:relative}
.proto-tab-name{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray);display:block}
.proto-tab-prog{font-size:9px;color:#444;display:block;margin-top:3px}
.proto-tab.active .proto-tab-name{color:var(--gold)}
.proto-tab.active{border-color:var(--gold);background:rgba(201,168,76,.06)}
.proto-tab.has-progress .proto-tab-name{color:var(--gold-d)}
.proto-tab.has-progress{border-color:var(--gold-d)}
.proto-tab.primary-tab::before{content:'#1';position:absolute;top:-1px;left:-1px;background:var(--gold);color:var(--black);font-size:7px;font-weight:700;padding:2px 5px;letter-spacing:1px}

/* PROTOCOL CARD */
.proto-header{margin-bottom:20px}
.proto-header-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.proto-header-title{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--white);margin-bottom:8px}
.proto-header-title em{font-style:normal;color:var(--gold)}
.proto-header-lead{font-size:13px;color:#BDB097;line-height:1.65}
.proto-prog-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.proto-prog-bar{flex:1;height:3px;background:#1A1A1A;overflow:hidden}
.proto-prog-fill{height:100%;background:linear-gradient(90deg,var(--gold-d),var(--gold-l));transition:width .5s ease}
.proto-prog-label{font-size:11px;color:var(--gray);white-space:nowrap}
.proto-week{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.proto-day-btn{width:38px;height:38px;border:1px solid #2A2A2A;background:var(--d2);font-size:11px;font-weight:700;color:var(--gray);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.proto-day-btn:hover:not(:disabled){border-color:var(--gold-d);color:var(--white)}
.proto-day-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.proto-day-btn.done{background:rgba(201,168,76,.15);border-color:var(--gold-d);color:var(--gold)}
.proto-day-btn:disabled{opacity:.3;cursor:default}
.proto-card{background:var(--d2);border:1px solid #2A2A2A;padding:24px}
.proto-day-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.proto-day-title{font-family:'Cinzel',serif;font-size:17px;font-weight:700;color:var(--white);margin-bottom:6px}
.proto-day-mission{font-size:14px;color:#BDB097;line-height:1.6;margin-bottom:20px}
.proto-when{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gold-d);margin-bottom:12px}
.proto-steps{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.proto-step{display:flex;align-items:flex-start;gap:12px;cursor:pointer}
.pstep-box{width:18px;height:18px;border:1px solid #444;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.pstep-box.chk{background:var(--gold);border-color:var(--gold)}
.pstep-box.chk::after{content:'';display:block;width:5px;height:9px;border:2px solid var(--black);border-top:none;border-left:none;transform:rotate(45deg);margin-top:-2px}
.pstep-txt{font-size:13px;line-height:1.6;color:#C8C0B0;transition:color .2s}
.pstep-txt.done{color:#555;text-decoration:line-through}
.proto-avoid{background:#1A1010;border-left:3px solid var(--red);padding:14px 16px;margin-bottom:14px;font-size:13px;color:#BDB097;line-height:1.6}
.proto-avoid strong{color:var(--red);font-size:9px;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:6px}
.proto-reflect{background:#0F0F1A;border-left:3px solid var(--gold-d);padding:14px 16px;margin-bottom:20px;font-size:13px;color:#BDB097;line-height:1.6;font-style:italic}
.proto-reflect strong{font-style:normal;color:var(--gold);font-size:9px;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:6px}
.proto-complete-btn{width:100%;padding:14px;background:var(--gold);color:var(--black);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;transition:background .2s}
.proto-complete-btn:hover{background:var(--gold-l)}
.proto-done-card{background:rgba(201,168,76,.08);border:1px solid var(--gold-d);padding:16px;text-align:center;font-size:13px;color:var(--gold);font-weight:600}
.proto-all-done{background:rgba(201,168,76,.1);border:1px solid var(--gold);padding:20px;text-align:center;margin-top:12px}
.proto-all-done p{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);margin-bottom:6px}
.proto-all-done span{font-size:12px;color:var(--gray)}

/* ACCOUNTABILITY */
.accountability-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.acct-btn{flex:1;min-width:140px;padding:13px 16px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;border:1px solid var(--gold-d);background:transparent;color:var(--gold);display:flex;align-items:center;justify-content:center;gap:8px}
.acct-btn:hover{background:rgba(201,168,76,.08)}
.acct-btn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}

/* LOCKED */
.locked-wrap{position:relative;border:1px solid #222;overflow:hidden;margin-bottom:40px;min-height:240px}
.locked-blur{filter:blur(5px);pointer-events:none;padding:24px 24px 32px;opacity:.35}
.locked-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,10,.88);gap:10px;padding:24px;text-align:center}
.lock-icon{font-size:28px}
.locked-hed{font-family:'Cinzel',serif;font-size:17px;font-weight:700;color:var(--white)}
.locked-sub{font-size:13px;color:var(--gray);max-width:320px;line-height:1.6}
.unlock-tag{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-d);padding:5px 14px;margin-top:4px}

/* CTA */
.cta-block{background:linear-gradient(135deg,#1A1508,#0F0F0F);border:1px solid var(--gold-d);padding:36px 40px;text-align:center;margin-bottom:16px}
.cta-block h3{font-family:'Cinzel',serif;font-size:20px;color:var(--white);margin-bottom:10px}
.cta-block p{font-size:14px;color:#BDB097;line-height:1.7;margin-bottom:24px;max-width:480px;margin-left:auto;margin-right:auto}
.cta-note{font-size:11px;color:var(--gray);margin-top:20px}
.btn-gold{display:inline-block;padding:16px 44px;background:var(--gold);color:var(--black);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;transition:background .2s;text-decoration:none}
.btn-gold:hover{background:var(--gold-l)}
.btn-outline{display:inline-block;padding:13px 30px;background:transparent;color:var(--gold);font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:1px solid var(--gold-d);cursor:pointer;transition:all .2s;text-decoration:none}
.btn-outline:hover{background:rgba(201,168,76,.08)}
@media(max-width:600px){.cta-block{padding:24px 20px}.proto-tab{min-width:60px;padding:8px 4px}}

/* PRINT */
@media print{
  body{background:#fff!important;color:#000!important}
  .wrap,#result-wrap{display:none!important}
  #print-content{display:block!important}
  #print-content *{color:#000!important;background:#fff!important;border-color:#ddd!important}
  .pp-page{padding:36px 48px;page-break-after:always;box-sizing:border-box}
  .pp-eyebrow{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#9A7530!important;margin-bottom:8px}
  .pp-title{font-family:'Cinzel',serif;font-size:28px;font-weight:900;line-height:1.1;margin-bottom:10px}
  .pp-title em{font-style:normal;color:#C9A84C!important}
  .pp-lead{font-size:12px;line-height:1.65;color:#444!important;margin-bottom:24px}
  .pp-stat-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .pp-stat-name{width:70px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
  .pp-stat-bar{flex:1;height:4px;background:#eee!important;overflow:hidden}
  .pp-stat-fill{height:100%;background:#C9A84C!important}
  .pp-stat-fill.low{background:#C47070!important}
  .pp-stat-pct{width:30px;font-size:9px;font-weight:700;text-align:right}
  .pp-section-title{font-family:'Cinzel',serif;font-size:18px;font-weight:700;margin:20px 0 12px;padding-top:16px;border-top:2px solid #C9A84C!important}
  .pp-day-block{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #eee!important}
  .pp-day-block:last-child{border-bottom:none!important}
  .pp-day-num{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#9A7530!important;margin-bottom:3px}
  .pp-day-title{font-family:'Cinzel',serif;font-size:13px;font-weight:700;margin-bottom:3px}
  .pp-day-mission{font-size:11px;color:#444!important;margin-bottom:8px;font-style:italic}
  .pp-day-when{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#9A7530!important;margin-bottom:6px}
  .pp-step{font-size:11px;line-height:1.5;margin-bottom:3px;padding-left:14px;position:relative}
  .pp-step::before{content:'';position:absolute;left:0;top:5px;width:7px;height:7px;border:1px solid #999!important}
  .pp-avoid{font-size:10px;color:#C47070!important;margin-top:6px;padding-left:8px;border-left:2px solid #C47070!important}
  .pp-avoid strong,.pp-reflect strong{font-size:8px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:2px}
  .pp-reflect{font-size:10px;color:#555!important;margin-top:4px;font-style:italic;padding-left:8px;border-left:2px solid #C9A84C!important}
}
</style>
</head>
<body>
<div class="wrap" id="result-wrap"></div>
<div id="print-content" style="display:none"></div>

<script>
const WEBHOOK_URL = ''; // ── CONFIG ── Paste your GoHighLevel webhook URL here

const stored     = JSON.parse(localStorage.getItem('ka_result')||'null');
const storedUser = JSON.parse(localStorage.getItem('ka_user')||'null');
if(!stored){ window.location.replace('/'); }

const primaryResult = stored.type;
const uName = storedUser && storedUser.name ? storedUser.name : null;

const STAT_SCORES = {
  fit:     {fit:17, fight:41, freedom:36, faith:44, family:38},
  fight:   {fit:39, fight:15, freedom:43, faith:37, family:41},
  freedom: {fit:37, fight:35, freedom:13, faith:39, family:42},
  faith:   {fit:41, fight:43, freedom:38, faith:16, family:35},
  family:  {fit:35, fight:39, freedom:36, faith:40, family:14}
};

const STAT_LABELS = {fit:'FIT',fight:'FIGHT',freedom:'FREEDOM',faith:'FAITH',family:'FAMILY'};
const stat = STAT_SCORES[primaryResult];

const RESULTS = {
  fit:{
    badge:'FIT',
    title:'The <em>Fit</em> Protocol',
    lead:"Your body is the machine that runs everything else. You cannot build a life at full speed from a body running at half capacity.",
    lockedSub:"Your strength score, wealth readiness, and performance ceiling unlock at the free session.",
    ctaTitle:"Level up your whole character.",
    ctaBody:"King Azoulay's free live session breaks down the direct connection between physical discipline and every other stat in your life.",
    days:[
      {n:"01",title:"Take the Baseline",mission:"You cannot improve what you refuse to measure.",when:"First thing in the morning, before anything else.",
       steps:["Take a photo. Front and side. Same spot you will use again on Day 7.","Write three words that describe how your body actually feels right now.","Write the one physical habit you have been avoiding the longest.","Drink one full glass of water before you eat anything. That is your first act of discipline today."],
       avoid:"Do not turn today into a full plan. Just take the baseline. The protocol does the rest.",reflection:"What has avoiding my physical health actually cost me?"},
      {n:"02",title:"Own Your Morning",mission:"Movement before the world gets access to you changes everything that comes after.",when:"The moment your alarm goes off. No negotiation.",
       steps:["Feet on the floor before your brain argues. No snooze. Not once.","Ten minutes of movement before you touch your phone. Push-ups, a walk, anything physical.","Drink water. Eat something real within the first hour.","Write one sentence: what would it feel like to own every morning this week?"],
       avoid:"Do not check your phone until after you have moved.",reflection:"What does my morning say about the person I am becoming?"},
      {n:"03",title:"Find Your Line",mission:"Your body invented a stopping point. Today you go past it.",when:"Morning. Before eating.",
       steps:["Push-ups until your body says stop. Rest sixty seconds.","Bodyweight squats until your body says stop. Rest sixty seconds.","Plank until your body shakes and stops. Rest sixty seconds.","When your body says stop on each movement, add ten more seconds. That ten seconds is the only part that matters.","Write one word describing how you feel right now."],
       avoid:"Do not count reps. Track only time.",reflection:"At what point did I want to quit, and what made me keep going?"},
      {n:"04",title:"Cut One Thing",mission:"The body you want and the habits you have right now cannot both exist.",when:"Decision made in the morning. Executed all day.",
       steps:["Name the one food or drink doing the most damage to your energy.","Cut it completely today. Not reduced. Gone.","Replace it with water or something clean.","At the end of the day write what you noticed about your energy."],
       avoid:"Do not try to cut five things. One cut that actually happens beats ten cuts that stay on paper.",reflection:"What am I feeding my body that I would be embarrassed to admit?"},
      {n:"05",title:"Fix Your Recovery",mission:"Sleep is not rest. Sleep is when your body builds.",when:"This one starts the night before.",
       steps:["Decide what time you are going to sleep tonight and commit to it.","Phone leaves the bedroom or goes face down across the room.","Ten minutes before bed with no screen. Sit quiet, breathe, or pray.","When you wake up, write whether you feel different after one night of intentional recovery."],
       avoid:"Do not underestimate this day because it feels passive. Recovery is where the gains actually happen.",reflection:"What would change if I protected my sleep the way I protect my phone?"},
      {n:"06",title:"Show Up Again",mission:"Consistency is the only thing that separates a workout from a lifestyle.",when:"Same time as Day 3.",
       steps:["Repeat the Day 3 circuit completely.","After finishing, add one full extra round.","Walk fifteen minutes with no phone. Think about who you are becoming.","Write two things: what improved since Day 3 and one thing to build on next week."],
       avoid:"Do not measure success by how your body looks today. Measure it by whether you showed up.",reflection:"What does doing this twice in one week say about who I am choosing to become?"},
      {n:"07",title:"The After",mission:"Day 7 is the moment you decide if this was an experiment or a beginning.",when:"Morning. Same conditions as Day 1.",
       steps:["Take the after photo. Same room, same angle, same lighting.","Put both photos side by side and look at them for sixty seconds.","Write what changed. Not just the body. The discipline, the self-respect, the proof.","Write one sentence to the person in the Day 1 photo.","Choose one habit from this week to make permanent. One."],
       avoid:"Do not minimize what changed because the physical difference looks small. Seven days of discipline is rare.",reflection:"Which habit from this week am I committing to permanently?"}
    ]
  },
  fight:{
    badge:'FIGHT',
    title:'The <em>Fight</em> Protocol',
    lead:"A man who cannot protect himself cannot protect anything else. His family, his money, his peace. All of it is only as safe as he is capable. This week you start becoming dangerous.",
    lockedSub:"Your combat readiness score and physical protection capability unlock at the free session.",
    ctaTitle:"A dangerous man is a free man.",
    ctaBody:"King Azoulay's free live session covers why physical capability changes the way you carry yourself in every room you walk into. Business, family, life.",
    days:[
      {n:"01",title:"Find a Gym Today",mission:"You cannot learn to fight by thinking about it. You need a place and a coach.",when:"Today. Do not wait until tomorrow.",
       steps:["Search right now for boxing gyms, MMA gyms, or Muay Thai gyms near you. Pick the closest one with real training, not a fitness class.","Call or message them today. Ask about the next beginner class or open mat. Get the time.","Book it. Pay if you have to. That commitment is the first step.","If you cannot get to a gym this week, find a YouTube channel from a real coach and follow a beginner striking combo today. Get your hands moving."],
       avoid:"Do not overthink which style. Boxing, Muay Thai, BJJ, wrestling. All of them work. The one you actually go to is the right one.",reflection:"What would change about the way I carry myself if I knew I could handle myself?"},
      {n:"02",title:"Learn Your Stance",mission:"Everything in fighting starts from the right position. If your foundation is wrong, nothing else works.",when:"Morning. Thirty minutes. Space to move.",
       steps:["Get into a fighting stance. Dominant hand back, non-dominant hand forward, feet shoulder-width apart, weight balanced, chin down.","Practice moving in your stance. Forward, back, left, right. Stay light on your feet for five minutes straight.","Throw a jab from your stance. Snap it out, bring it back fast. Do fifty reps.","Add a cross. Jab then cross. Do fifty combinations. Slow is fine. Get the form right."],
       avoid:"Do not skip the footwork. Everyone skips the footwork. The footwork is what keeps you alive.",reflection:"What does it feel like to move like someone who knows what they are doing?"},
      {n:"03",title:"Hit Something Hard",mission:"You need to know what it feels like to actually hit something with full power.",when:"Today. Find a bag, a pad, or something solid and safe.",
       steps:["Find a heavy bag, a punching pad, or ask someone to hold a pillow. You need resistance.","Warm up for three minutes. Jump rope, jog in place, shadowbox.","Do three rounds of two minutes each. Jab, cross, hook. Throw combinations. Rest one minute between rounds.","After round three, throw ten of the hardest punches you can. Everything you have."],
       avoid:"Do not throw hard punches with bad form or bare knuckles. Wrap your hands or wear gloves. Injury on Day 3 ends your week.",reflection:"What does it feel like when your body is doing something it was built to do?"},
      {n:"04",title:"Learn to Take a Hit",mission:"Anyone can throw. The ones who are actually dangerous are the ones who do not panic when it comes back.",when:"Training session. With a partner if possible.",
       steps:["If you are at a gym, tell your coach you want to work on defense today. Head movement, slipping, blocking.","Practice the basic slip. When a punch comes toward your left, move your head right. When it comes right, move left. Drill it.","If you are alone, shadowbox and practice slipping your own imaginary punches. Move your head every time you throw.","Do three rounds of defense-focused sparring or shadow work. Move, do not just stand there."],
       avoid:"Do not tense up when something comes at you. Tension slows you down. Stay loose, stay moving.",reflection:"What is the difference between a man who panics and a man who stays calm under pressure?"},
      {n:"05",title:"Ground Game",mission:"Most real situations end up on the ground. You need to know what to do when they do.",when:"Training session. Today.",
       steps:["Go to your gym and ask to work grappling or wrestling basics. Or find a BJJ class this week.","Learn the basic positions: mount, guard, side control. Just know what they are called and what they feel like.","Practice breaking out of someone holding you down. Base out, bridge, shrimp movement. Have someone show you or find a video from a real coach.","Do a five-minute live round on the ground if you have a training partner. Just try to get on top and stay there."],
       avoid:"Do not assume your size or strength is enough on the ground. Technique beats size every time.",reflection:"If someone bigger than me grabbed me right now, what would I actually do?"},
      {n:"06",title:"Put It Together",mission:"You have been learning pieces. Today you combine them.",when:"Full training session. Give it everything.",
       steps:["Warm up properly. Jump rope or jog for five minutes.","Shadow box for two rounds combining everything: stance, footwork, jab-cross-hook, head movement.","Do two rounds on the bag or with a partner, combining striking and grappling.","Stay after your session or put in fifteen extra minutes of the thing you feel weakest at."],
       avoid:"Do not train like you are trying to look good. Train like your life depends on it, because one day it might.",reflection:"Who in my life am I now more capable of protecting because I showed up this week?"},
      {n:"07",title:"Make This Permanent",mission:"Seven days is a start. A dangerous man trains for life.",when:"Today. After your session.",
       steps:["Sign up for a regular class or training schedule. At minimum twice a week. Put the dates in your calendar right now.","Buy your own gloves and hand wraps if you do not have them. This is your gear. Own it.","Find one training partner, even a beginner like you. Two people who train together show up more than one person alone.","The free session is your next step. Come as someone who is already in the gym."],
       avoid:"Do not let this week be a seven-day experiment that fades. The discipline of showing up to train carries into everything else.",reflection:"What kind of man do I want to be in five years, and does that man train or does he make excuses?"}
    ]
  },
  freedom:{
    badge:'FREEDOM',
    title:'The <em>Freedom</em> Protocol',
    lead:"The reason most people never get free financially is simple. They try five things at once and go nowhere on all of them. Pick one. Go all in. That is the whole strategy.",
    lockedSub:"Your wealth readiness score, income ceiling, and time freedom index unlock at the free session.",
    ctaTitle:"One thing done well beats five things done badly every time.",
    ctaBody:"King Azoulay's free live session breaks down the exact process he used to build income from one focused bet and why spreading yourself is the most expensive mistake you can make.",

// Order protocols by how much the person talked about each area (biggest gap first)
const scores = stored.scores || {fit:0,fight:0,freedom:0,faith:0,family:0};
const orderedKeys = Object.keys(RESULTS).sort((a,b) => (scores[b]||0) - (scores[a]||0));

// If scores are all 0 (old result), fall back to primary first
if(Object.values(scores).every(v => v === 0)){
  orderedKeys.sort((a,b) => a === primaryResult ? -1 : b === primaryResult ? 1 : 0);
}

let activeProto = orderedKeys[0];
const protoState = {};
orderedKeys.forEach(key => {
  const saved = JSON.parse(localStorage.getItem('ka_proto_'+key)||'null');
  protoState[key] = {
    key: 'ka_proto_'+key,
    curDay: 0,
    daysCompleted: saved ? saved.daysCompleted : [],
    stepsChecked:  saved ? saved.stepsChecked  : {}
  };
  for(let i=0;i<7;i++){
    if(protoState[key].daysCompleted.includes(i)) protoState[key].curDay = Math.min(i+1,6);
  }
});

function fakeRow(){ return `<div style="display:flex;gap:3px;margin-bottom:10px">${Array(10).fill('<div style="flex:1;height:6px;background:#222"></div>').join('')}</div>`; }

function statBars(){
  return Object.entries(STAT_LABELS).map(([k,l]) => {
    const pct = stat[k], bot = k === primaryResult;
    return `<div class="stat-row">
      <div class="stat-name${bot?' bot':''}">${l}</div>
      <div class="stat-bar"><div class="stat-fill${bot?' low':' ok'}" data-pct="${pct}"></div></div>
      <div class="stat-pct${bot?' bot':''}">${pct}%</div>
    </div>`;
  }).join('');
}

function renderTabs(){
  document.getElementById('proto-tabs').innerHTML = orderedKeys.map((key,i) => {
    const ps = protoState[key];
    const done = ps.daysCompleted.length;
    const isPrimary = i === 0;
    const isActive = key === activeProto;
    let cls = 'proto-tab';
    if(isActive) cls += ' active';
    if(done > 0 && !isActive) cls += ' has-progress';
    if(isPrimary) cls += ' primary-tab';
    return `<button class="${cls}" onclick="switchProto('${key}')">
      <span class="proto-tab-name">${STAT_LABELS[key]}</span>
      <span class="proto-tab-prog">${done}/7 done</span>
    </button>`;
  }).join('');
}

function switchProto(key){
  activeProto = key;
  renderTabs();
  renderProtoHeader();
  renderWeek();
  renderDay();
}

function renderProtoHeader(){
  const r = RESULTS[activeProto];
  const idx = orderedKeys.indexOf(activeProto);
  const label = idx === 0 ? 'Start Here' : `Protocol ${idx+1} of 5`;
  document.getElementById('proto-header').innerHTML = `
    <p class="proto-header-label">${label}</p>
    <h2 class="proto-header-title">${r.title}</h2>
    <p class="proto-header-lead">${r.lead}</p>`;
}

function renderWeek(){
  const ps = protoState[activeProto];
  const maxU = ps.daysCompleted.length > 0 ? Math.min(Math.max(...ps.daysCompleted)+1, 6) : 0;
  document.getElementById('proto-week').innerHTML = RESULTS[activeProto].days.map((_,i) => {
    const done = ps.daysCompleted.includes(i);
    const locked = i > maxU;
    const active = i === ps.curDay;
    let cls = 'proto-day-btn' + (done?' done':active?' active':'');
    return `<button class="${cls}" onclick="goDay(${i})" ${locked?'disabled':''}>${i+1}</button>`;
  }).join('');
  const c = ps.daysCompleted.length;
  document.getElementById('proto-prog-fill').style.width = ((c/7)*100)+'%';
  document.getElementById('proto-prog-label').textContent = `${c} of 7 days done`;
}

function renderDay(){
  const ps = protoState[activeProto];
  const day = RESULTS[activeProto].days[ps.curDay];
  const checked = ps.stepsChecked[ps.curDay] || [];
  const done = ps.daysCompleted.includes(ps.curDay);
  const allChk = checked.length >= day.steps.length;
  document.getElementById('proto-card').innerHTML = `
    <p class="proto-day-label">Day ${ps.curDay+1} of 7</p>
    <h3 class="proto-day-title">${day.title}</h3>
    <p class="proto-day-mission">${day.mission}</p>
    <p class="proto-when">${day.when}</p>
    <div class="proto-steps">
      ${day.steps.map((s,i)=>`
        <div class="proto-step" onclick="toggleStep(${i})">
          <div class="pstep-box${checked.includes(i)?' chk':''}"></div>
          <span class="pstep-txt${checked.includes(i)?' done':''}">${s}</span>
        </div>`).join('')}
    </div>
    <div class="proto-avoid"><strong>Avoid</strong>${day.avoid}</div>
    <div class="proto-reflect"><strong>Reflect</strong>${day.reflection}</div>
    ${done
      ? `<div class="proto-done-card">Day ${ps.curDay+1} complete. Keep going.</div>`
      : `<button class="proto-complete-btn" onclick="completeDay()" style="display:${allChk?'block':'none'}">Mark Day ${ps.curDay+1} Complete</button>`}`;
}

function goDay(i){
  const ps = protoState[activeProto];
  const maxU = ps.daysCompleted.length > 0 ? Math.min(Math.max(...ps.daysCompleted)+1, 6) : 0;
  if(i > maxU) return;
  ps.curDay = i;
  renderWeek();
  renderDay();
}

function toggleStep(i){
  const ps = protoState[activeProto];
  if(ps.daysCompleted.includes(ps.curDay)) return;
  if(!ps.stepsChecked[ps.curDay]) ps.stepsChecked[ps.curDay] = [];
  const idx = ps.stepsChecked[ps.curDay].indexOf(i);
  if(idx > -1) ps.stepsChecked[ps.curDay].splice(idx,1);
  else ps.stepsChecked[ps.curDay].push(i);
  saveProto(activeProto);
  renderDay();
}

function completeDay(){
  const ps = protoState[activeProto];
  if(!ps.daysCompleted.includes(ps.curDay)) ps.daysCompleted.push(ps.curDay);
  saveProto(activeProto);
  const user = JSON.parse(localStorage.getItem('ka_user')||'{}');
  fireWebhook({event:'day_completed',email:user.email||'',first_name:user.name||'',result_type:activeProto,day_number:ps.curDay+1,day_title:RESULTS[activeProto].days[ps.curDay].title,days_completed_count:ps.daysCompleted.length,completed_at:new Date().toISOString(),source:'character-blueprint-quiz'});
  if(ps.daysCompleted.length===7) fireWebhook({event:'protocol_completed',email:user.email||'',first_name:user.name||'',result_type:activeProto,completed_at:new Date().toISOString(),source:'character-blueprint-quiz'});
  if(ps.curDay < 6) ps.curDay++;
  renderTabs();
  renderWeek();
  renderDay();
}

function saveProto(key){
  localStorage.setItem('ka_proto_'+key, JSON.stringify({daysCompleted:protoState[key].daysCompleted, stepsChecked:protoState[key].stepsChecked}));
}

function addToCalendar(){
  const today = new Date();
  let ical = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//King Azoulay//Character Blueprint//EN\r\nCALSCALE:GREGORIAN\r\n';
  const r = RESULTS[orderedKeys[0]];
  r.days.forEach((day,i) => {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const ds = d.toISOString().replace(/-/g,'').substring(0,8);
    const desc = `${day.mission}\\n\\nWHEN: ${day.when}\\n\\n${day.steps.map((s,j)=>`${j+1}. ${s}`).join('\\n')}\\n\\nREFLECT: ${day.reflection}`;
    ical += `BEGIN:VEVENT\r\nDTSTART;VALUE=DATE:${ds}\r\nSUMMARY:Day ${i+1}: ${day.title} (${STAT_LABELS[orderedKeys[0]]} Protocol)\r\nDESCRIPTION:${desc}\r\nEND:VEVENT\r\n`;
  });
  ical += 'END:VCALENDAR';
  const blob = new Blob([ical],{type:'text/calendar;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=`ka-${orderedKeys[0]}-protocol.ics`; a.click();
  URL.revokeObjectURL(url);
}

function retake(){
  localStorage.removeItem('ka_result');
  localStorage.removeItem('ka_user');
  ['fit','fight','freedom','faith','family'].forEach(k=>localStorage.removeItem('ka_proto_'+k));
  window.location.replace('/');
}

async function fireWebhook(payload){
  if(!WEBHOOK_URL) return;
  try{ await fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); }catch(e){}
}

  <div class="sec-label" style="margin-top:48px">What Is Coming Next</div>
